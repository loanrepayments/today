<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hicas Payment</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:#fff;
width:360px;
padding:25px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
text-align:center;
}


h2{
margin-top:15px;
color:#222;
}

.timer{
font-size:32px;
font-weight:bold;
color:red;
margin:18px 0;
}

.box{
background:#f2f2f2;
padding:12px;
border-radius:10px;
margin-top:10px;
font-size:18px;
word-break:break-word;
}

img{
margin-top:20px;
width:220px;
height:220px;
border-radius:8px;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0d6efd;
color:#fff;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0b5ed7;
}

#copyBtn{
width:auto;
padding:8px 18px;
margin-top:12px;
font-size:15px;
}

#message{
display:none;
margin-top:18px;
padding:12px;
background:#d4edda;
color:#155724;
border:1px solid #28a745;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

small{
display:block;
margin-top:15px;
color:#666;
}
</style>

</head>
<body>

<div class="card">

<h2>YourLoan</h2>
<div class="timer" id="timer">10:00</div>

<div class="box">
<b>Amount</b><br>
₹3,817<br>
</div>

<div class="box">
<b>UPI ID</b><br>

<span id="upiText">8810439946-2@okbizaxis</span>

<br>

<button id="copyBtn" type="button" onclick="copyUPI()">
📋 Copy UPI
</button>

</div>

<img id="qr" alt="QR Code">

<div style="margin-top:18px;">
<input
type="text"
id="utr"
placeholder="Enter UTR Number"
style="width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:16px;">
</div>

<button onclick="submitPayment()">Submit UTR</button>

<div id="message">
✅ Contact to Agent
</div>

<small>Please complete payment before the timer expires.</small>

</div>

<script>


const upiElement = document.getElementById("upiText");
const originalUPI = upiElement.textContent.trim();

upiElement.dataset.upi = originalUPI;

function maskUPI(upi) {
  const parts = upi.split("@");
  const id = parts[0];
  const handle = parts[1] || "";

  if (id.length <= 9) {
    return id.substring(0, 3) + "*****@" + handle;
  }

  return id.substring(0, 5) + "*****" + id.substring(id.length - 4) + "@" + handle;
}

upiElement.textContent = maskUPI(originalUPI);

const upiLink = `upi://pay?pa=${originalUPI}&cu=INR`;
document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" +
encodeURIComponent(upiLink);
// Timer
let time=600;

function updateTimer(){

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerHTML=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

if(time>0){
time--;
}else{
document.getElementById("timer").innerHTML="EXPIRED";
}

}

updateTimer();
setInterval(updateTimer,1000);

// Copy UPI
function copyUPI() {
  const upi = document.getElementById("upiText").dataset.upi;

  navigator.clipboard.writeText(upi).then(() => {
    document.getElementById("copyBtn").innerHTML = "✅ Copied";
    setTimeout(() => {
      document.getElementById("copyBtn").innerHTML = "📋 Copy UPI";
    }, 2000);
  });
}
// Submit UTR
function submitPayment(){

const utr=document.getElementById("utr").value.trim();

if(!/^\d{12}$/.test(utr)){
alert("❌ Invalid UTR Number! Please enter a valid 12-digit UTR.");
return;
}

document.getElementById("message").style.display="block";
document.getElementById("message").innerHTML=
"✅ UTR Submitted Successfully.<br>Contact your Agent.";

}

</script>

</body>
</html>
